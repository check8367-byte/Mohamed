<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Mahmoud | Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تصميم الزرار ليكون واضح جداً وقابل للضغط */
        .music-btn {
            cursor: pointer;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #28a745; /* لون أخضر عشان يبان إنه تشغيل */
            color: white;
            padding: 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-family: sans-serif;
            font-weight: bold;
            min-width: 100px;
        }
    </style>
</head>
<body>

    <div class="music-btn" id="musicBtn">
        <span id="statusText">تشغيل الإذاعة 🔊</span>
    </div>

    <div class="container">
        <img src="https://i.postimg.cc/nVNvqCxd/54c7d667a257a66718129902a14b90b3-(1).jpg" alt="Mohamed Mahmoud" class="profile-img">
        
        <h1>Mohamed Mahmoud</h1>
        <p class="welcome-text">Welcome To My World</p>

        <div class="links-container">
            <a href="https://t.me/Mohame_d0" class="link-card" target="_blank">My account</a>
            <a href="https://t.me/Ta3at_Allah_Life" class="link-card" target="_blank">My channel</a>
            <a href="https://wa.me/201272038295" class="link-card" target="_blank">WhatsApp</a>
            <a href="https://www.tiktok.com/@mohme_d6" class="link-card" target="_blank">TikTok</a>
            <a href="https://www.facebook.com/share/1aR3273mpV/" class="link-card" target="_blank">Facebook</a>
            <a href="https://91993905443298.sarhne.com" class="link-card" target="_blank">Sarhne</a>
        </div>

        <footer>Mohamed Mahmoud 2026 ©</footer>
    </div>

    <audio id="audioPlayer">
        <source src="https://n02.radiojar.com/8s5u5tpdtiduv?rj-ttl=5&rj-tok=AAABj_X" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById("audioPlayer");
        const musicBtn = document.getElementById("musicBtn");
        const statusText = document.getElementById("statusText");

        musicBtn.addEventListener("click", function() {
            if (audio.paused) {
                // محاولة تشغيل الصوت
                audio.play().then(() => {
                    statusText.innerText = "إيقاف ⏸️";
                    musicBtn.style.background = "#dc3545"; // أحمر عند الإيقاف
                }).catch(err => {
                    alert("برجاء الضغط مرة أخرى للتشغيل");
                });
            } else {
                audio.pause();
                statusText.innerText = "تشغيل 🔊";
                musicBtn.style.background = "#28a745"; // أخضر عند التشغيل
            }
        });
    </script>
</body>
</html>
